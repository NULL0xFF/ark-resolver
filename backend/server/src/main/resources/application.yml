spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: ark-resolver

  datasource:
    url: jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:ark_resolver}?createDatabaseIfNotExist=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:secret}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      initialization-fail-timeout: -1

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.MariaDBDialect

app:
  external-url: ${EXTERNAL_URL:http://localhost}
  jwt:
    secret: ${JWT_SECRET:your-256-bit-secret-key-goes-here-change-me}
    expiration-ms: 86400000
  oauth2:
    discord:
      client-id: ${DISCORD_CLIENT_ID:}
      client-secret: ${DISCORD_CLIENT_SECRET:}
      redirect-uri: ${DISCORD_REDIRECT_URI:${app.external-url}/login/callback}

server:
  port: 8080
  forward-headers-strategy: native

management:
  endpoints:
    web:
      exposure:
        include: health

springdoc:
  swagger-ui:
    path: /api/docs
  api-docs:
    path: /api/docs-json
